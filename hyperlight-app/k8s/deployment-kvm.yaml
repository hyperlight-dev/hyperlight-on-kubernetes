# Hyperlight Hello World - KVM Deployment
# Image is substituted at deploy time via envsubst
# Use: just app-local-deploy / just app-azure-deploy / just app-ghcr-deploy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperlight-hello-kvm
  labels:
    app: hyperlight-hello
    hypervisor: kvm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hyperlight-hello
      hypervisor: kvm
  template:
    metadata:
      labels:
        app: hyperlight-hello
        hypervisor: kvm
    spec:
      nodeSelector:
        hyperlight.dev/hypervisor: kvm
      tolerations:
        - key: "hyperlight.dev/hypervisor"
          operator: "Equal"
          value: "kvm"
          effect: "NoSchedule"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hyperlight-hello
          image: ${IMAGE}
          imagePullPolicy: Always
          args: ["--loop-mode", "--message", "Hello from KVM!"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              hyperlight.dev/hypervisor: "1"
              memory: "128Mi"
              cpu: "500m"
            requests:
              hyperlight.dev/hypervisor: "1"
              memory: "64Mi"
              cpu: "100m"
